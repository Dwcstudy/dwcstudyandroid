<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DWC Study - Power Admin Control Panel</title>

  <!-- Font Awesome Icons & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       1. ADVANCED BLUE-PURPLE WHITE LIGHT THEME (MATCHED WITH LOGIN & REGISTRATION)
       ========================================================================== */
    :root {
      --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --primary-color: #2563eb;
      --purple-color: #7c3aed;
      --indigo-dark: #0f172a;
      --blue-light: #eff6ff;
      --purple-light: #f5f3ff;
      --border-color: #cbd5e1;
      --border-focus: #3b82f6;
      --input-bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow-glow: 0 10px 25px -5px rgba(37, 99, 235, 0.2);
      --shadow-card: 0 10px 30px -10px rgba(15, 23, 42, 0.08);
      --font-heading: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f1f5f9;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ==========================================================================
       2. TOP CENTER TOAST NOTIFICATION
       ========================================================================== */
    .toast-container-center {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      width: 90%;
      max-width: 420px;
      pointer-events: none;
    }

    .toast-msg {
      pointer-events: auto;
      background: var(--primary-gradient);
      color: #ffffff;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: slideDownCenter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .toast-msg.error {
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      box-shadow: 0 12px 30px rgba(220, 38, 38, 0.35);
    }

    @keyframes slideDownCenter {
      from { opacity: 0; transform: translate(-50%, -30px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ==========================================================================
       3. TOP ADMIN NAVIGATION BAR
       ========================================================================== */
    .admin-navbar {
      background: #ffffff;
      border-bottom: 1px solid var(--border-color);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      sticky: top;
      z-index: 500;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo-icon {
      width: 44px;
      height: 44px;
      background: var(--primary-gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 20px;
      box-shadow: var(--shadow-glow);
    }

    .brand-title {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-badge {
      background: var(--purple-light);
      color: var(--purple-color);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      border: 1px solid #e9d5ff;
    }

    .admin-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-action-primary {
      background: var(--primary-gradient);
      color: #ffffff;
      border: none;
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-glow);
    }

    .btn-action-primary:active { transform: scale(0.97); }

    /* ==========================================================================
       4. DASHBOARD LAYOUT & ANALYTICS CARDS
       ========================================================================== */
    .admin-container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .analytics-card {
      background: #ffffff;
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1.5px solid #e2e8f0;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .analytics-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: var(--blue-light);
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .analytics-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .analytics-value {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 800;
      color: var(--indigo-dark);
      margin-top: 2px;
    }

    /* ==========================================================================
       5. DATA MANAGEMENT CONTROLS & TABLE
       ========================================================================== */
    .table-card {
      background: #ffffff;
      border-radius: var(--radius-lg);
      border: 1.5px solid #e2e8f0;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .table-header-toolbar {
      padding: 18px;
      border-bottom: 1.5px solid #e2e8f0;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .toolbar-title {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 800;
      color: var(--indigo-dark);
    }

    .toolbar-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      flex: 1;
      justify-content: flex-end;
    }

    .search-input-box {
      position: relative;
      min-width: 240px;
    }

    .search-input-box input {
      width: 100%;
      height: 40px;
      padding: 0 12px 0 36px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-color);
      background: var(--input-bg);
      font-size: 12px;
      font-weight: 600;
      outline: none;
    }

    .search-input-box input:focus {
      border-color: var(--primary-color);
      background: #ffffff;
    }

    .search-input-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
    }

    .select-filter {
      height: 40px;
      padding: 0 12px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-color);
      background: var(--input-bg);
      font-size: 12px;
      font-weight: 700;
      color: var(--indigo-dark);
      outline: none;
      cursor: pointer;
    }

    /* Table Responsive Wrapper */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 12px;
    }

    th {
      background: #f8fafc;
      padding: 14px 16px;
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 1.5px solid #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      color: var(--indigo-dark);
      font-weight: 600;
      vertical-align: middle;
      white-space: nowrap;
    }

    tr:hover { background: #f8fafc; }

    .user-profile-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary-gradient);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
    }

    .role-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      display: inline-block;
    }

    .role-student { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .role-teacher { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }
    .role-other { background: #fefce8; color: #ca8a04; border: 1px solid #fef08a; }

    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .status-active { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status-blocked { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    /* Control Action Buttons inside Table */
    .action-btn-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-tbl {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: #ffffff;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-tbl:hover { background: var(--blue-light); color: var(--primary-color); border-color: var(--primary-color); }
    .btn-tbl.delete:hover { background: #fef2f2; color: #dc2626; border-color: #ef4444; }

    /* ==========================================================================
       6. ADVANCED EDIT USER MODAL
       ========================================================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(6px);
      z-index: 9000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.active { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      animation: modalZoom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalZoom { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 800;
      color: var(--indigo-dark);
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group-modal {
      margin-bottom: 12px;
    }

    .form-group-modal label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .form-group-modal input, .form-group-modal select {
      width: 100%;
      height: 42px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-color);
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      background: var(--input-bg);
    }

    .form-group-modal input:focus, .form-group-modal select:focus {
      border-color: var(--primary-color);
      background: #ffffff;
    }
  </style>
</head>
<body>

  <!-- Top Center Toast Slot -->
  <div class="toast-container-center" id="toastContainer"></div>

  <!-- Admin Top Nav Bar -->
  <header class="admin-navbar">
    <div class="brand-block">
      <div class="brand-logo-icon">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <span class="brand-title">DWC STUDY</span>
          <span class="brand-badge">Admin Panel</span>
        </div>
        <div style="font-size: 10px; color: var(--text-muted); font-weight: 600;">Control & Database Console</div>
      </div>
    </div>

    <div class="admin-actions">
      <button class="btn-action-primary" id="btnExportCSV">
        <i class="fa-solid fa-file-csv"></i>
        <span>Export Data</span>
      </button>
    </div>
  </header>

  <!-- Dashboard Content Wrapper -->
  <main class="admin-container">

    <!-- Analytics Top Grid Cards -->
    <section class="analytics-grid">
      <div class="analytics-card">
        <div class="analytics-icon"><i class="fa-solid fa-users"></i></div>
        <div>
          <div class="analytics-title">Total Registered</div>
          <div class="analytics-value" id="statTotalUsers">0</div>
        </div>
      </div>

      <div class="analytics-card">
        <div class="analytics-icon" style="background:#eff6ff; color:#2563eb;"><i class="fa-solid fa-user-graduate"></i></div>
        <div>
          <div class="analytics-title">Students</div>
          <div class="analytics-value" id="statStudents">0</div>
        </div>
      </div>

      <div class="analytics-card">
        <div class="analytics-icon" style="background:#f5f3ff; color:#7c3aed;"><i class="fa-solid fa-chalkboard-user"></i></div>
        <div>
          <div class="analytics-title">Teachers</div>
          <div class="analytics-value" id="statTeachers">0</div>
        </div>
      </div>

      <div class="analytics-card">
        <div class="analytics-icon" style="background:#f0fdf4; color:#16a34a;"><i class="fa-solid fa-user-check"></i></div>
        <div>
          <div class="analytics-title">Active Accounts</div>
          <div class="analytics-value" id="statActive">0</div>
        </div>
      </div>
    </section>

    <!-- Control & Data Table Card -->
    <section class="table-card">
      
      <!-- Toolbar Filter Options -->
      <div class="table-header-toolbar">
        <div class="toolbar-title"><i class="fa-solid fa-database" style="color: var(--primary-color);"></i> User Management Database</div>
        
        <div class="toolbar-filters">
          <div class="search-input-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search by name, email, or mobile..." />
          </div>

          <select class="select-filter" id="roleFilter">
            <option value="ALL">All Roles</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="other">Other User</option>
          </select>

          <select class="select-filter" id="statusFilter">
            <option value="ALL">All Status</option>
            <option value="active">Active</option>
            <option value="blocked">Blocked</option>
          </select>
        </div>
      </div>

      <!-- Data Table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>User Details</th>
              <th>Contact Info</th>
              <th>Role</th>
              <th>Class / Target</th>
              <th>Status</th>
              <th>Reg Date</th>
              <th style="text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr>
              <td colspan="7" style="text-align: center; padding: 30px; color: var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 20px;"></i> Loading Realtime Users...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </section>

  </main>

  <!-- EDIT USER FULL MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title"><i class="fa-solid fa-user-pen" style="color: var(--primary-color);"></i> Edit User Control</div>
        <button class="btn-tbl" onclick="closeEditModal()">✕</button>
      </div>

      <form id="editUserForm">
        <input type="hidden" id="editUserId" />

        <div class="form-grid-2">
          <div class="form-group-modal">
            <label>Full Name</label>
            <input type="text" id="editFullName" required />
          </div>
          <div class="form-group-modal">
            <label>Mobile Number</label>
            <input type="text" id="editMobile" required />
          </div>
        </div>

        <div class="form-group-modal">
          <label>Email Address</label>
          <input type="email" id="editEmail" required />
        </div>

        <div class="form-grid-2">
          <div class="form-group-modal">
            <label>User Role</label>
            <select id="editRole">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group-modal">
            <label>Status</label>
            <select id="editStatus">
              <option value="active">Active</option>
              <option value="blocked">Blocked</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group-modal">
            <label>Class / Course</label>
            <input type="text" id="editClass" />
          </div>
          <div class="form-group-modal">
            <label>Batch / Subject</label>
            <input type="text" id="editBatch" />
          </div>
        </div>

        <div style="margin-top: 18px; display: flex; gap: 10px;">
          <button type="submit" class="btn-action-primary" style="flex: 1; height: 44px; justify-content: center;">Save Changes</button>
          <button type="button" class="btn-tbl" onclick="closeEditModal()" style="height: 44px; width: 80px;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FIREBASE ENGINE & ADVANCED CONTROL LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAHw2ceBKirLjpBx0soxJD0GHWwXnrxo4Y",
      authDomain: "thar-e5879.firebaseapp.com",
      databaseURL: "https://thar-e5879-default-rtdb.firebaseio.com",
      projectId: "thar-e5879",
      storageBucket: "thar-e5879.firebasestorage.app",
      messagingSenderId: "1004657134263",
      appId: "1:1004657134263:web:a2d8844554000981659b32"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allUsersData = {};

    // Notification Helper
    window.showToast = function(msg, isSuccess = true) {
      const container = document.getElementById('toastContainer');
      container.innerHTML = "";
      const toast = document.createElement('div');
      toast.className = `toast-msg ${isSuccess ? '' : 'error'}`;
      toast.innerHTML = `<i class="fa-solid ${isSuccess ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    };

    // Listen Realtime Firebase User Database
    const usersRef = ref(db, 'users');
    onValue(usersRef, (snapshot) => {
      if (snapshot.exists()) {
        allUsersData = snapshot.val();
        renderTableAndStats();
      } else {
        allUsersData = {};
        document.getElementById('userTableBody').innerHTML = `
          <tr><td colspan="7" style="text-align:center; padding: 20px;">No Users Found in Database</td></tr>
        `;
      }
    });

    // Render Table & Update Live Stats Engine
    function renderTableAndStats() {
      const tbody = document.getElementById('userTableBody');
      const searchVal = document.getElementById('searchInput').value.toLowerCase();
      const roleVal = document.getElementById('roleFilter').value;
      const statusVal = document.getElementById('statusFilter').value;

      tbody.innerHTML = "";

      let total = 0, students = 0, teachers = 0, active = 0;

      for (let uid in allUsersData) {
        const user = allUsersData[uid];
        total++;

        const userRole = user.role || 'student';
        const userStatus = user.status || 'active';

        if (userRole === 'student') students++;
        if (userRole === 'teacher') teachers++;
        if (userStatus === 'active') active++;

        // Search & Filter conditions
        const name = (user.fullName || user.name || 'N/A').toLowerCase();
        const email = (user.email || '').toLowerCase();
        const mobile = (user.mobile || '').toLowerCase();

        const matchesSearch = name.includes(searchVal) || email.includes(searchVal) || mobile.includes(searchVal);
        const matchesRole = roleVal === 'ALL' || userRole === roleVal;
        const matchesStatus = statusVal === 'ALL' || userStatus === statusVal;

        if (matchesSearch && matchesRole && matchesStatus) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="user-profile-cell">
                <div class="user-avatar">${(name[0] || 'U').toUpperCase()}</div>
                <div>
                  <div style="font-weight:700;">${user.fullName || user.name || 'Unnamed User'}</div>
                  <div style="font-size:10px; color:var(--text-muted);">UID: ${uid.substring(0, 8)}...</div>
                </div>
              </div>
            </td>
            <td>
              <div>${user.mobile || 'N/A'}</div>
              <div style="font-size:11px; color:var(--text-muted);">${user.email || 'N/A'}</div>
            </td>
            <td><span class="role-badge role-${userRole}">${userRole}</span></td>
            <td>${user.studentClass || user.subject || 'Standard'}</td>
            <td>
              <span class="status-badge status-${userStatus}">
                <i class="fa-solid fa-circle" style="font-size: 6px;"></i> ${userStatus}
              </span>
            </td>
            <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A'}</td>
            <td>
              <div class="action-btn-group" style="justify-content: center;">
                <button class="btn-tbl" title="Edit User" onclick="openEditModal('${uid}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn-tbl" title="Toggle Block" onclick="toggleBlockUser('${uid}', '${userStatus}')"><i class="fa-solid fa-ban"></i></button>
                <button class="btn-tbl delete" title="Delete User" onclick="deleteUserRecord('${uid}')"><i class="fa-solid fa-trash-can"></i></button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        }
      }

      // Update Analytics Values
      document.getElementById('statTotalUsers').innerText = total;
      document.getElementById('statStudents').innerText = students;
      document.getElementById('statTeachers').innerText = teachers;
      document.getElementById('statActive').innerText = active;
    }

    // Event Listeners for Filters
    document.getElementById('searchInput').addEventListener('input', renderTableAndStats);
    document.getElementById('roleFilter').addEventListener('change', renderTableAndStats);
    document.getElementById('statusFilter').addEventListener('change', renderTableAndStats);

    // Edit User Modal Handlers
    window.openEditModal = function(uid) {
      const u = allUsersData[uid];
      if (!u) return;

      document.getElementById('editUserId').value = uid;
      document.getElementById('editFullName').value = u.fullName || u.name || '';
      document.getElementById('editMobile').value = u.mobile || '';
      document.getElementById('editEmail').value = u.email || '';
      document.getElementById('editRole').value = u.role || 'student';
      document.getElementById('editStatus').value = u.status || 'active';
      document.getElementById('editClass').value = u.studentClass || '';
      document.getElementById('editBatch').value = u.subject || '';

      document.getElementById('editModal').classList.add('active');
    };

    window.closeEditModal = function() {
      document.getElementById('editModal').classList.remove('active');
    };

    // Save Edit Form
    document.getElementById('editUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const uid = document.getElementById('editUserId').value;

      const updatedObj = {
        fullName: document.getElementById('editFullName').value.trim(),
        mobile: document.getElementById('editMobile').value.trim(),
        email: document.getElementById('editEmail').value.trim(),
        role: document.getElementById('editRole').value,
        status: document.getElementById('editStatus').value,
        studentClass: document.getElementById('editClass').value.trim(),
        subject: document.getElementById('editBatch').value.trim()
      };

      try {
        await update(ref(db, `users/${uid}`), updatedObj);
        showToast('User record updated successfully!');
        closeEditModal();
      } catch (err) {
        showToast('Update failed: ' + err.message, false);
      }
    });

    // Toggle User Block Status
    window.toggleBlockUser = async function(uid, currentStatus) {
      const newStatus = currentStatus === 'active' ? 'blocked' : 'active';
      try {
        await update(ref(db, `users/${uid}`), { status: newStatus });
        showToast(`User status set to ${newStatus.toUpperCase()}`);
      } catch (err) {
        showToast('Status change failed', false);
      }
    };

    // Delete User
    window.deleteUserRecord = async function(uid) {
      if (confirm('Are you sure you want to delete this user permanently?')) {
        try {
          await remove(ref(db, `users/${uid}`));
          showToast('User deleted from database!');
        } catch (err) {
          showToast('Delete failed: ' + err.message, false);
        }
      }
    };

    // CSV Export Engine
    document.getElementById('btnExportCSV').addEventListener('click', () => {
      let csvContent = "data:text/csv;charset=utf-8,UID,Full Name,Mobile,Email,Role,Status\n";
      for (let uid in allUsersData) {
        const u = allUsersData[uid];
        csvContent += `"${uid}","${u.fullName || ''}","${u.mobile || ''}","${u.email || ''}","${u.role || 'student'}","${u.status || 'active'}"\n`;
      }
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `DWC_Users_Export_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  </script>
</body>
</html>
