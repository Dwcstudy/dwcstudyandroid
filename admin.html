<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DWC Study - Power Admin Control Panel</title>

  <!-- Font Awesome Icons & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --primary-color: #2563eb;
      --purple-color: #7c3aed;
      --indigo-dark: #0f172a;
      --blue-light: #eff6ff;
      --purple-light: #f5f3ff;
      --border-color: #cbd5e1;
      --input-bg: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow-glow: 0 10px 25px -5px rgba(37, 99, 235, 0.25);
      --shadow-card: 0 10px 30px -10px rgba(15, 23, 42, 0.08);
      --font-heading: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    input, select, button, textarea {
      user-select: auto;
    }

    body {
      background: #f8fafc;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Top Android Safe Toast Notification Center */
    .toast-container-center {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      width: 92%;
      max-width: 420px;
      pointer-events: none;
    }

    .toast-msg {
      pointer-events: auto;
      background: var(--primary-gradient);
      color: #ffffff;
      padding: 12px 18px;
      border-radius: var(--radius-md);
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.25);
      animation: slideDownCenter 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .toast-msg.error {
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      box-shadow: 0 12px 30px rgba(220, 38, 38, 0.35);
    }

    .toast-msg.fade-out {
      animation: fadeOutUp 0.35s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @keyframes slideDownCenter {
      from { opacity: 0; transform: translateY(-25px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeOutUp {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-20px) scale(0.95); }
    }

    /* Top Navbar Optimized for Mobile Cutout */
    .admin-navbar {
      background: #ffffff;
      border-bottom: 1.5px solid #e2e8f0;
      padding: max(14px, env(safe-area-inset-top)) 16px 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo-icon {
      width: 42px;
      height: 42px;
      background: var(--primary-gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 18px;
      box-shadow: var(--shadow-glow);
    }

    .brand-title {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-badge {
      background: var(--purple-light);
      color: var(--purple-color);
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      border: 1px solid #e9d5ff;
    }

    .btn-action-primary {
      background: var(--primary-gradient);
      color: #ffffff;
      border: none;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-glow);
      transition: transform 0.15s ease;
    }

    .btn-action-primary:active { transform: scale(0.95); }

    /* Main Content Container */
    .admin-container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Analytics Grid System */
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 768px) {
      .analytics-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .analytics-card {
      background: #ffffff;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid #e2e8f0;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .analytics-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--blue-light);
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .analytics-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .analytics-value {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 800;
      color: var(--indigo-dark);
      margin-top: 1px;
    }

    /* Data Table Card */
    .table-card {
      background: #ffffff;
      border-radius: var(--radius-lg);
      border: 1.5px solid #e2e8f0;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .table-header-toolbar {
      padding: 16px;
      border-bottom: 1.5px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (min-width: 768px) {
      .table-header-toolbar { flex-direction: row; justify-content: space-between; align-items: center; }
    }

    .toolbar-title {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 800;
      color: var(--indigo-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .search-input-box {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-input-box input {
      width: 100%;
      height: 42px;
      padding: 0 12px 0 36px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-color);
      background: var(--input-bg);
      font-size: 12px;
      font-weight: 600;
      outline: none;
    }

    .search-input-box input:focus {
      border-color: var(--primary-color);
      background: #ffffff;
    }

    .search-input-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
    }

    .select-filter {
      height: 42px;
      padding: 0 10px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-color);
      background: var(--input-bg);
      font-size: 12px;
      font-weight: 700;
      color: var(--indigo-dark);
      outline: none;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 12px;
    }

    th {
      background: #f8fafc;
      padding: 12px 14px;
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 1.5px solid #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid #f1f5f9;
      color: var(--indigo-dark);
      font-weight: 600;
      vertical-align: middle;
      white-space: nowrap;
    }

    tr:hover { background: #f8fafc; }

    .user-profile-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--primary-gradient);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      flex-shrink: 0;
    }

    .source-badge {
      font-size: 9px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .source-firestore { background: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
    .source-rtdb { background: #f0fdf4; color: #15803d; border: 1px solid #dcfce7; }

    .role-badge {
      padding: 3px 8px;
      border-radius: 14px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      display: inline-block;
    }

    .role-student { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .role-teacher { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }
    .role-other { background: #fefce8; color: #ca8a04; border: 1px solid #fef08a; }

    .status-badge {
      padding: 3px 8px;
      border-radius: 14px;
      font-size: 10px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .status-active { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status-blocked { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    .action-btn-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-tbl {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: #ffffff;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .btn-tbl:active { transform: scale(0.92); }
    .btn-tbl.delete:hover { background: #fef2f2; color: #dc2626; border-color: #ef4444; }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 9000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.active { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 800;
      color: var(--indigo-dark);
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-group-modal { margin-bottom: 10px; }

    .form-group-modal label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .form-group-modal input, .form-group-modal select {
      width: 100%;
      height: 40px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-color);
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      background: var(--input-bg);
    }

    .form-group-modal input:focus, .form-group-modal select:focus {
      border-color: var(--primary-color);
      background: #ffffff;
    }
  </style>
</head>
<body>

  <!-- Toast Slot -->
  <div class="toast-container-center" id="toastContainer"></div>

  <!-- Admin Navigation -->
  <header class="admin-navbar">
    <div class="brand-block">
      <div class="brand-logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <div>
        <div style="display: flex; align-items: center; gap: 6px;">
          <span class="brand-title">DWC STUDY</span>
          <span class="brand-badge">Power Panel</span>
        </div>
        <div style="font-size: 9px; color: var(--text-muted); font-weight: 600;">Firestore + Realtime Engine</div>
      </div>
    </div>

    <div>
      <button class="btn-action-primary" id="btnExportCSV">
        <i class="fa-solid fa-file-csv"></i>
        <span>Export</span>
      </button>
    </div>
  </header>

  <!-- Dashboard Container -->
  <main class="admin-container">

    <!-- Analytics Cards -->
    <section class="analytics-grid">
      <div class="analytics-card">
        <div class="analytics-icon"><i class="fa-solid fa-users"></i></div>
        <div>
          <div class="analytics-title">Total Users</div>
          <div class="analytics-value" id="statTotalUsers">0</div>
        </div>
      </div>

      <div class="analytics-card">
        <div class="analytics-icon" style="background:#eff6ff; color:#2563eb;"><i class="fa-solid fa-user-graduate"></i></div>
        <div>
          <div class="analytics-title">Students</div>
          <div class="analytics-value" id="statStudents">0</div>
        </div>
      </div>

      <div class="analytics-card">
        <div class="analytics-icon" style="background:#f5f3ff; color:#7c3aed;"><i class="fa-solid fa-chalkboard-user"></i></div>
        <div>
          <div class="analytics-title">Teachers</div>
          <div class="analytics-value" id="statTeachers">0</div>
        </div>
      </div>

      <div class="analytics-card">
        <div class="analytics-icon" style="background:#fff7ed; color:#ea580c;"><i class="fa-solid fa-fire"></i></div>
        <div>
          <div class="analytics-title">Firestore</div>
          <div class="analytics-value" id="statFirestore">0</div>
        </div>
      </div>
    </section>

    <!-- Table Section -->
    <section class="table-card">
      <div class="table-header-toolbar">
        <div class="toolbar-title"><i class="fa-solid fa-database" style="color: var(--primary-color);"></i> Live User Database</div>
        
        <div class="toolbar-filters">
          <div class="search-input-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search name, email, phone..." />
          </div>

          <select class="select-filter" id="roleFilter">
            <option value="ALL">All Roles</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="other">Other</option>
          </select>

          <select class="select-filter" id="sourceFilter">
            <option value="ALL">All Sources</option>
            <option value="firestore">Firestore</option>
            <option value="rtdb">Realtime DB</option>
          </select>
        </div>
      </div>

      <!-- User Data Table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>User Details</th>
              <th>Source</th>
              <th>Contact Info</th>
              <th>Role</th>
              <th>Class/Subject</th>
              <th>Status</th>
              <th style="text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr>
              <td colspan="7" style="text-align: center; padding: 30px; color: var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 20px;"></i> Syncing Cloud Firestore & Database...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Edit User Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title"><i class="fa-solid fa-user-pen" style="color: var(--primary-color);"></i> Edit Record Controls</div>
        <button class="btn-tbl" onclick="closeEditModal()">✕</button>
      </div>

      <form id="editUserForm">
        <input type="hidden" id="editUserId" />
        <input type="hidden" id="editUserSource" />

        <div class="form-grid-2">
          <div class="form-group-modal">
            <label>Full Name</label>
            <input type="text" id="editFullName" required />
          </div>
          <div class="form-group-modal">
            <label>Mobile Number</label>
            <input type="text" id="editMobile" required />
          </div>
        </div>

        <div class="form-group-modal">
          <label>Email Address</label>
          <input type="email" id="editEmail" required />
        </div>

        <div class="form-grid-2">
          <div class="form-group-modal">
            <label>User Role</label>
            <select id="editRole">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group-modal">
            <label>Status</label>
            <select id="editStatus">
              <option value="active">Active</option>
              <option value="blocked">Blocked</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group-modal">
            <label>Class / Target</label>
            <input type="text" id="editClass" />
          </div>
          <div class="form-group-modal">
            <label>Batch / Subject</label>
            <input type="text" id="editBatch" />
          </div>
        </div>

        <div style="margin-top: 14px; display: flex; gap: 8px;">
          <button type="submit" class="btn-action-primary" style="flex: 1; height: 42px; justify-content: center;">Save Changes</button>
          <button type="button" class="btn-tbl" onclick="closeEditModal()" style="height: 42px; width: 70px;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FIREBASE INTEGRATION WITH YOUR SPECIFIC SDK / CONFIG -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getDatabase, ref, onValue, update as rtdbUpdate, remove as rtdbRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Exact Firebase Configuration Attached
    const firebaseConfig = {
      apiKey: "AIzaSyDW8XJ6aOGDQ3uTkPtG7RlDhZIB6h0iNOQ",
      authDomain: "dwcstudy-ad27f.firebaseapp.com",
      projectId: "dwcstudy-ad27f",
      storageBucket: "dwcstudy-ad27f.firebasestorage.app",
      messagingSenderId: "89865011297",
      appId: "1:89865011297:web:659c58ba10f7d7778a6a20",
      measurementId: "G-6J3H6T9V8D"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const rtdb = getDatabase(app);
    const fsdb = getFirestore(app);

    let mergedUserData = {};
    let toastTimeout = null;

    // Toast Notification System (Auto-Hide 3sec)
    window.showToast = function(msg, isSuccess = true) {
      const container = document.getElementById('toastContainer');
      container.innerHTML = "";
      if (toastTimeout) clearTimeout(toastTimeout);

      const toast = document.createElement('div');
      toast.className = `toast-msg ${isSuccess ? '' : 'error'}`;
      toast.innerHTML = `<i class="fa-solid ${isSuccess ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i> <span>${msg}</span>`;
      container.appendChild(toast);

      toastTimeout = setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => { if (toast.parentNode) toast.remove(); }, 350);
      }, 3000);
    };

    // 1. Live Sync - Realtime Database
    const rtdbRef = ref(rtdb, 'users');
    onValue(rtdbRef, (snapshot) => {
      const data = snapshot.val() || {};
      for (let uid in data) {
        mergedUserData[`rtdb_${uid}`] = {
          ...data[uid],
          rawId: uid,
          source: 'rtdb'
        };
      }
      renderTableAndStats();
    });

    // 2. Live Sync - Firestore Database
    const firestoreUsersRef = collection(fsdb, "users");
    onSnapshot(firestoreUsersRef, (snapshot) => {
      snapshot.docChanges().forEach((change) => {
        const uid = change.doc.id;
        if (change.type === "removed") {
          delete mergedUserData[`firestore_${uid}`];
        } else {
          mergedUserData[`firestore_${uid}`] = {
            ...change.doc.data(),
            rawId: uid,
            source: 'firestore'
          };
        }
      });
      renderTableAndStats();
    });

    // Render Table and Live Analytics
    function renderTableAndStats() {
      const tbody = document.getElementById('userTableBody');
      const searchVal = document.getElementById('searchInput').value.toLowerCase();
      const roleVal = document.getElementById('roleFilter').value;
      const sourceVal = document.getElementById('sourceFilter').value;

      tbody.innerHTML = "";

      let total = 0, students = 0, teachers = 0, firestoreCount = 0;

      for (let key in mergedUserData) {
        const user = mergedUserData[key];
        total++;

        const userRole = user.role || 'student';
        const userStatus = user.status || 'active';
        const userSource = user.source;

        if (userRole === 'student') students++;
        if (userRole === 'teacher') teachers++;
        if (userSource === 'firestore') firestoreCount++;

        const name = (user.fullName || user.name || 'N/A').toLowerCase();
        const email = (user.email || '').toLowerCase();
        const mobile = (user.mobile || '').toLowerCase();

        const matchesSearch = name.includes(searchVal) || email.includes(searchVal) || mobile.includes(searchVal);
        const matchesRole = roleVal === 'ALL' || userRole === roleVal;
        const matchesSource = sourceVal === 'ALL' || userSource === sourceVal;

        if (matchesSearch && matchesRole && matchesSource) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="user-profile-cell">
                <div class="user-avatar">${(name[0] || 'U').toUpperCase()}</div>
                <div>
                  <div style="font-weight:700;">${user.fullName || user.name || 'Unnamed User'}</div>
                  <div style="font-size:10px; color:var(--text-muted);">ID: ${user.rawId.substring(0, 8)}...</div>
                </div>
              </div>
            </td>
            <td>
              <span class="source-badge source-${userSource}">${userSource}</span>
            </td>
            <td>
              <div>${user.mobile || 'N/A'}</div>
              <div style="font-size:11px; color:var(--text-muted);">${user.email || 'N/A'}</div>
            </td>
            <td><span class="role-badge role-${userRole}">${userRole}</span></td>
            <td>${user.studentClass || user.subject || 'Standard'}</td>
            <td>
              <span class="status-badge status-${userStatus}">
                <i class="fa-solid fa-circle" style="font-size: 5px;"></i> ${userStatus}
              </span>
            </td>
            <td>
              <div class="action-btn-group" style="justify-content: center;">
                <button class="btn-tbl" title="Edit Record" onclick="openEditModal('${key}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn-tbl" title="Toggle Block" onclick="toggleBlockUser('${key}')"><i class="fa-solid fa-ban"></i></button>
                <button class="btn-tbl delete" title="Delete User" onclick="deleteUserRecord('${key}')"><i class="fa-solid fa-trash-can"></i></button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        }
      }

      document.getElementById('statTotalUsers').innerText = total;
      document.getElementById('statStudents').innerText = students;
      document.getElementById('statTeachers').innerText = teachers;
      document.getElementById('statFirestore').innerText = firestoreCount;
    }

    // Filter Handlers
    document.getElementById('searchInput').addEventListener('input', renderTableAndStats);
    document.getElementById('roleFilter').addEventListener('change', renderTableAndStats);
    document.getElementById('sourceFilter').addEventListener('change', renderTableAndStats);

    // Modal Control
    window.openEditModal = function(key) {
      const u = mergedUserData[key];
      if (!u) return;

      document.getElementById('editUserId').value = u.rawId;
      document.getElementById('editUserSource').value = u.source;
      document.getElementById('editFullName').value = u.fullName || u.name || '';
      document.getElementById('editMobile').value = u.mobile || '';
      document.getElementById('editEmail').value = u.email || '';
      document.getElementById('editRole').value = u.role || 'student';
      document.getElementById('editStatus').value = u.status || 'active';
      document.getElementById('editClass').value = u.studentClass || '';
      document.getElementById('editBatch').value = u.subject || '';

      document.getElementById('editModal').classList.add('active');
    };

    window.closeEditModal = function() {
      document.getElementById('editModal').classList.remove('active');
    };

    // Update Record Handler
    document.getElementById('editUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const rawId = document.getElementById('editUserId').value;
      const source = document.getElementById('editUserSource').value;

      const updateData = {
        fullName: document.getElementById('editFullName').value.trim(),
        mobile: document.getElementById('editMobile').value.trim(),
        email: document.getElementById('editEmail').value.trim(),
        role: document.getElementById('editRole').value,
        status: document.getElementById('editStatus').value,
        studentClass: document.getElementById('editClass').value.trim(),
        subject: document.getElementById('editBatch').value.trim()
      };

      try {
        if (source === 'firestore') {
          await updateDoc(doc(fsdb, "users", rawId), updateData);
        } else {
          await rtdbUpdate(ref(rtdb, `users/${rawId}`), updateData);
        }
        showToast(`Record updated successfully!`);
        closeEditModal();
      } catch (err) {
        showToast("Update failed: " + err.message, false);
      }
    });

    // Toggle Block Status
    window.toggleBlockUser = async function(key) {
      const u = mergedUserData[key];
      if (!u) return;
      const newStatus = u.status === 'active' ? 'blocked' : 'active';

      try {
        if (u.source === 'firestore') {
          await updateDoc(doc(fsdb, "users", u.rawId), { status: newStatus });
        } else {
          await rtdbUpdate(ref(rtdb, `users/${u.rawId}`), { status: newStatus });
        }
        showToast(`Status updated to ${newStatus.toUpperCase()}`);
      } catch (err) {
        showToast('Status update failed', false);
      }
    };

    // Delete Record
    window.deleteUserRecord = async function(key) {
      const u = mergedUserData[key];
      if (!u) return;

      if (confirm(`Are you sure you want to delete this user?`)) {
        try {
          if (u.source === 'firestore') {
            await deleteDoc(doc(fsdb, "users", u.rawId));
          } else {
            await rtdbRemove(ref(rtdb, `users/${u.rawId}`));
          }
          showToast('User record deleted successfully!');
        } catch (err) {
          showToast('Delete failed: ' + err.message, false);
        }
      }
    };

    // CSV Data Export Engine
    document.getElementById('btnExportCSV').addEventListener('click', () => {
      let csv = "data:text/csv;charset=utf-8,ID,Source,Name,Mobile,Email,Role,Status\n";
      for (let key in mergedUserData) {
        const u = mergedUserData[key];
        csv += `"${u.rawId}","${u.source}","${u.fullName || ''}","${u.mobile || ''}","${u.email || ''}","${u.role || 'student'}","${u.status || 'active'}"\n`;
      }
      const uri = encodeURI(csv);
      const link = document.createElement("a");
      link.href = uri;
      link.download = `DWC_Admin_Users_${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  </script>
</body>
</html>
